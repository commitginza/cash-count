<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>現金管理ツール</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <h1 class="text-2xl font-bold mb-6">現金管理ツール</h1>

  <div id="tabs" class="flex flex-wrap gap-2 mb-4">
    <button data-tab="tab-1F" class="tab-btn bg-blue-600 text-white px-4 py-2 rounded">1F</button>
    <button data-tab="tab-2F" class="tab-btn bg-gray-300 text-gray-800 px-4 py-2 rounded">2F</button>
    <button data-tab="tab-expense" class="tab-btn bg-gray-300 text-gray-800 px-4 py-2 rounded">経費</button>
    <button data-tab="tab-total" class="tab-btn bg-gray-300 text-gray-800 px-4 py-2 rounded ml-auto">トータル</button>
  </div>

  <div id="tab-contents"></div>

  <template id="cash-template">
    <section class="bg-white shadow rounded-xl p-6 mb-10" data-tab-content data-section="">
      <h2 class="text-xl font-semibold mb-4"></h2>

      <div class="mb-6">
        <h3 class="text-lg font-medium mb-4">当日現金</h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm mb-1">100万のまとまり (束数または金額)</label>
            <input type="text" inputmode="numeric" class="cash-input bundle-count w-full border rounded p-2" value="0" />
          </div>
          <div>
            <label class="block text-sm mb-1">100万以外の端数札 (円)</label>
            <input type="text" inputmode="numeric" class="cash-input partial-cash w-full border rounded p-2" value="0" />
          </div>
        </div>

        <h4 class="font-medium mb-2">小銭 (枚数を入力)</h4>
        <div class="coin-grid grid grid-cols-2 md:grid-cols-3 gap-4"></div>
      </div>

      <div class="border-t pt-4">
        <p class="text-lg font-semibold">当日現金 合計: <span class="today-total">0</span> 円</p>
      </div>
    </section>
  </template>

  <template id="coin-row-template">
    <div>
      <label class="block text-sm mb-1"></label>
      <input type="text" inputmode="numeric" class="cash-input coin-count w-full border rounded p-2" data-value="" value="0" />
    </div>
  </template>

  <template id="total-template">
    <section class="bg-white shadow rounded-xl p-6 mb-10 hidden" id="tab-total" data-tab-content>
      <h2 class="text-xl font-semibold mb-4">トータル</h2>

      <div class="space-y-3">
        <div class="flex items-center justify-between border rounded-lg p-4">
          <span class="font-medium">1F 当日現金合計</span>
          <span id="total-1F" class="text-lg font-semibold">0 円</span>
        </div>
        <div class="flex items-center justify-between border rounded-lg p-4">
          <span class="font-medium">2F 当日現金合計</span>
          <span id="total-2F" class="text-lg font-semibold">0 円</span>
        </div>
        <div class="flex items-center justify-between border rounded-lg p-4">
          <span class="font-medium">経費 当日現金合計</span>
          <span id="total-expense" class="text-lg font-semibold">0 円</span>
        </div>
      </div>
    </section>
  </template>

  <script>
    const COINS = [
      { label: '500円', value: 500 },
      { label: '100円', value: 100 },
      { label: '50円',  value: 50 },
      { label: '10円',  value: 10 },
      { label: '5円',   value: 5 },
      { label: '1円',   value: 1 }
    ];

    const TABS = [
      { key: '1F', tabId: 'tab-1F', totalId: 'total-1F' },
      { key: '2F', tabId: 'tab-2F', totalId: 'total-2F' },
      { key: '経費', tabId: 'tab-expense', totalId: 'total-expense' }
    ];

    const fmt = (n) => Number(n || 0).toLocaleString();
    const num = (v) => {
      const s = String(v ?? '').replace(/[^0-9.-]/g, '');
      return parseInt(s, 10) || 0;
    };

    const tplCash = document.getElementById('cash-template');
    const tplCoin = document.getElementById('coin-row-template');
    const tplTotal = document.getElementById('total-template');
    const container = document.getElementById('tab-contents');
    const sections = {};

    document.getElementById('tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;

      const targetTabId = btn.dataset.tab;

      document.querySelectorAll('.tab-btn').forEach((tabBtn) => {
        const isActive = tabBtn.dataset.tab === targetTabId;
        tabBtn.classList.toggle('bg-blue-600', isActive);
        tabBtn.classList.toggle('text-white', isActive);
        tabBtn.classList.toggle('bg-gray-300', !isActive);
        tabBtn.classList.toggle('text-gray-800', !isActive);
      });

      document.querySelectorAll('[data-tab-content]').forEach((section) => {
        section.classList.toggle('hidden', section.id !== targetTabId);
      });
    });

    function buildCashTab(tab, index) {
      const sec = tplCash.content.querySelector('section').cloneNode(true);
      sec.id = tab.tabId;
      sec.dataset.section = tab.key;
      sec.querySelector('h2').textContent = tab.key;

      if (index !== 0) {
        sec.classList.add('hidden');
      }

      const coinGrid = sec.querySelector('.coin-grid');
      COINS.forEach(({ label, value }) => {
        const coinRow = tplCoin.content.firstElementChild.cloneNode(true);
        coinRow.querySelector('label').textContent = label;
        coinRow.querySelector('input').dataset.value = value;
        coinGrid.appendChild(coinRow);
      });

      sec.addEventListener('input', () => {
        recalcSection(sec);
        recalcTotal();
      });

      sec.addEventListener('focus', (e) => {
        if (!e.target.classList.contains('cash-input')) return;
        e.target.value = String(num(e.target.value));
      }, true);

      sec.addEventListener('blur', (e) => {
        if (!e.target.classList.contains('cash-input')) return;
        e.target.value = fmt(num(e.target.value));
        recalcSection(sec);
        recalcTotal();
      }, true);

      return sec;
    }

    function recalcSection(sec) {
      const bundleRaw = num(sec.querySelector('.bundle-count').value);
      const bundleAmount = bundleRaw >= 1000000 ? bundleRaw : bundleRaw * 1000000;
      const partialCash = num(sec.querySelector('.partial-cash').value);
      const coinTotal = [...sec.querySelectorAll('.coin-count')].reduce((sum, input) => {
        return sum + (num(input.value) * Number(input.dataset.value));
      }, 0);

      const todayTotal = bundleAmount + partialCash + coinTotal;
      sec.querySelector('.today-total').textContent = fmt(todayTotal);
      sec.dataset.todayTotal = String(todayTotal);
    }

    function recalcTotal() {
      TABS.forEach(({ key, totalId }) => {
        const total = Number(sections[key]?.dataset.todayTotal || 0);
        document.getElementById(totalId).textContent = `${fmt(total)} 円`;
      });
    }

    function formatAllInputs() {
      document.querySelectorAll('.cash-input').forEach((input) => {
        input.value = fmt(num(input.value));
      });
    }

    TABS.forEach((tab, index) => {
      const sec = buildCashTab(tab, index);
      container.appendChild(sec);
      sections[tab.key] = sec;
    });

    container.appendChild(tplTotal.content.querySelector('section').cloneNode(true));

    formatAllInputs();
    Object.values(sections).forEach(recalcSection);
    recalcTotal();
  </script>
</body>
</html>
